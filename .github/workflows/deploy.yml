name: Deploy GOETIA v2 to Nitro

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-goetia-v2-ovh
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy GOETIA v2 to Nitro via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Add deployment marker
        run: |
          echo "GOETIA v2 deploy" > dist/deploy-test.txt
          echo "Commit: $GITHUB_SHA" >> dist/deploy-test.txt
          echo "Date: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> dist/deploy-test.txt

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OVH_SSH_KEY }}" > ~/.ssh/ovh_key
          chmod 600 ~/.ssh/ovh_key
          ssh-keyscan -H "${{ secrets.OVH_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure remote target directory exists
        run: |
          ssh -i ~/.ssh/ovh_key "${{ secrets.OVH_USER }}@${{ secrets.OVH_HOST }}" "mkdir -p ~/nitro/goetia"

      - name: Deploy to Nitro with rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/ovh_key" \
            dist/ "${{ secrets.OVH_USER }}@${{ secrets.OVH_HOST }}:~/nitro/goetia/"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/ovh_key
